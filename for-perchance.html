<!-- Script Principal (Módulo ES6) -->
<script type="module">
  /**
   * CONFIGURAÇÃO IMPORTANTE:
   * Substitua a URL abaixo pela do SEU repositório no GitHub.
   * Formato: https://cdn.jsdelivr.net/gh/USUARIO/REPO@BRANCH/src/main.js?v=VERSAO
   * 
   * Use jsdelivr para servir os arquivos .js com MIME type correto.
   * Incremente ?v=X após cada push para forçar cache refresh.
   */
  
  // ⚠️ ATUALIZE ESTA URL PARA O SEU REPO:
  import { initGame } from "https://cdn.jsdelivr.net/gh/Fahell/test-perchance-git@main/src/main.js?v=11";
  
  // 🛡️ PROTEÇÃO CONTRA EXECUÇÃO DUPLA NO PERCHANCE
  // O Perchance re-renderiza o preview, re-executando este script.
  // Usamos sessionStorage para persistir entre re-renderizações.
  const ALREADY_INITIALIZED = sessionStorage.getItem('rpg_initialized') === 'true';
  
  if (ALREADY_INITIALIZED) {
    console.log('⏭️ Jogo já inicializado (sessionStorage). Ignorando re-execução.');
  } else {
    sessionStorage.setItem('rpg_initialized', 'true');
    console.log('📄 HTML Panel injetado, chamando initGame()...');
    initGame();
  }
  
  // Debug: botão para resetar (opcional, remova em produção)
  window.resetGame = () => {
    sessionStorage.removeItem('rpg_initialized');
    location.reload();
  };
  
  // Expor para debug (opcional)
  window.__perchanceDebug = { initGame };
</script>
