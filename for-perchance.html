</div>

<!-- Import do módulo principal via CDN -->
<script type="module">
  // 🛡️ Guard clause: Verifica se o jogo já foi inicializado
  if (window.__RPG_INITIALIZED) {
    console.warn('⏭️ Jogo já inicializado. Ignorando re-execução.');
  } else {
    window.__RPG_INITIALIZED = true;
    
    console.log('📄 HTML Panel injetado, chamando initGame()...');
    
    // Importa o ponto de entrada direto do GitHub via jsDelivr CDN
    // ⚠️ SEMPRE use tags de versão (ex: @v1.1.0) para evitar cache do CDN
    import { initGame } from "https://cdn.jsdelivr.net/gh/Fahell/test-perchance-git@v1.1.0/src/main.js";
    
    // Chama imediatamente (o DOM já está pronto no contexto de fragmento injetado)
    initGame();
  }
</script>
